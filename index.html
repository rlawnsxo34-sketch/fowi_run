<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>숲의 파수꾼: FoWI 소방관</title>
    <!-- Phaser.js 라이브러리 불러오기 -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>

<script>
// 1. 게임 기본 설정
const config = {
    type: Phaser.AUTO,
    scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH,
        width: 800,
        height: 400
    },
    physics: {
        default: 'arcade',
        arcade: {
            gravity: { y: 1000 },
            debug: false // 이 값을 true로 바꾸면 충돌 판정 박스가 보입니다!
        }
    },
    scene: {
        preload: preload,
        create: create,
        update: update
    }
};

const game = new Phaser.Game(config);

let player;
let background;
let obstacleGroup;
let itemGroup;
let gameOver = false;

// 2. 프리로드 (이미지 불러오기)
function preload() {
    this.load.image('bg', 'bg_forest.png');
    this.load.image('player', 'fowi_run.png');
    
    // 🌟 추가: 장애물과 아이템 이미지 로드
    this.load.image('obstacle', 'obs_tree.png'); 
    this.load.image('item', 'item_water.png'); 
}

// 3. 크리에이트 (객체 생성 및 규칙 설정)
function create() {
    background = this.add.tileSprite(400, 200, 800, 400, 'bg');

    player = this.physics.add.sprite(150, 300, 'player');
    player.setScale(0.5);
    player.setCollideWorldBounds(true);
    this.physics.world.bounds.height = 350;

    // 🌟 추가: 장애물과 아이템을 관리할 그룹 생성
    obstacleGroup = this.physics.add.group();
    itemGroup = this.physics.add.group();

    // 🌟 추가: 1.5초(1500ms)마다 장애물/아이템 생성 함수(spawnObjects) 실행
    this.time.addEvent({
        delay: 1500,
        callback: spawnObjects,
        callbackScope: this,
        loop: true
    });

    // 🌟 추가: 충돌 규칙 설정
    // 1) 플레이어와 장애물이 '부딪히면(collider)' hitObstacle 함수 실행
    this.physics.add.collider(player, obstacleGroup, hitObstacle, null, this);
    
    // 2) 플레이어와 아이템이 '겹치면(overlap)' collectItem 함수 실행
    this.physics.add.overlap(player, itemGroup, collectItem, null, this);

    // 모바일 터치 조작 (기존과 동일)
    this.input.on('pointerdown', function (pointer) {
        if (pointer.x > config.scale.width / 2 && player.body.onFloor()) {
            player.setVelocityY(-600);
        } else if (pointer.x <= config.scale.width / 2 && player.body.onFloor()) {
            player.setScale(0.5, 0.25);
        }
    });
    this.input.on('pointerup', function () {
        player.setScale(0.5, 0.5);
    });
}

// 4. 업데이트 (화면 갱신)
function update() {
    if (gameOver) return; // 게임 오버면 배경 스크롤 멈춤

    background.tilePositionX += 5;

    // 🌟 추가: 화면 밖으로 나간 장애물/아이템 메모리에서 삭제 (최적화)
    obstacleGroup.getChildren().forEach(function(obs) {
        if (obs.x < -50) obs.destroy();
    });
    itemGroup.getChildren().forEach(function(item) {
        if (item.x < -50) item.destroy();
    });
}

// ================= [새로 추가된 함수들] =================

// 장애물 & 아이템 생성 함수
function spawnObjects() {
    if (gameOver) return;

    // 70% 확률로 장애물, 30% 확률로 아이템 생성
    if (Math.random() > 0.3) {
        // 하단 장애물 생성
        let obs = obstacleGroup.create(850, 320, 'obstacle');
        obs.setScale(0.4);
        obs.setVelocityX(-300); // 왼쪽으로 다가오는 속도
        obs.body.allowGravity = false; // 장애물은 중력 무시
        obs.setImmovable(true); // 플레이어가 밀어도 밀리지 않음
    } else {
        // 공중 아이템 생성 (점프해서 먹도록 높이 조절)
        let item = itemGroup.create(850, 200, 'item');
        item.setScale(0.3);
        item.setVelocityX(-300);
        item.body.allowGravity = false;
    }
}

// 장애물과 부딪혔을 때 실행되는 함수
function hitObstacle(player, obstacle) {
    this.physics.pause(); // 모든 물리 엔진(움직임) 정지
    player.setTint(0xff0000); // 캐릭터를 붉은색으로 물들임 (데미지 효과)
    gameOver = true;
    
    // 화면에 게임오버 텍스트 띄우기
    this.add.text(400, 200, '앗, 산불에 닿았어요!', { fontSize: '40px', fill: '#FFF', stroke: '#000', strokeThickness: 5 }).setOrigin(0.5);
}

// 아이템을 먹었을 때 실행되는 함수
function collectItem(player, item) {
    item.disableBody(true, true); // 화면에서 아이템을 즉시 지움
    // 나중에 여기에 점수 올라가는 로직을 추가할 수 있습니다!
}
</script>

</body>
</html>
